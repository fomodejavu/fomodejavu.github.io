<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | FomoDéjàVu</title>
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="5;url=/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --paper: #f5f0e8; --ink: #0e0d0b; --amber: #c8820a; --muted: #7a7568; }
  body {
    background: var(--ink);
    color: var(--paper);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .wrap { max-width: 480px; }
  .big { font-family: 'Bebas Neue', sans-serif; font-size: 140px; letter-spacing: 0.04em; color: var(--amber); line-height: 1; margin-bottom: 8px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 0.1em; margin-bottom: 16px; }
  p { font-size: 13px; color: rgba(245,240,232,0.5); line-height: 1.6; margin-bottom: 24px; }
  .links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  a { color: var(--amber); text-decoration: none; font-size: 13px; letter-spacing: 0.1em; border-bottom: 1px solid var(--amber); padding-bottom: 2px; transition: opacity 0.15s; }
  a:hover { opacity: 0.7; }
</style>
</head>
<body>
<div class="wrap">
  <div class="big">404</div>
  <h1>PAGE NOT FOUND</h1>
  <p>This page doesn't exist — but the opportunity cost of missing out on great investments does. Redirecting to the calculator in 5 seconds.</p>
  <div class="links">
    <a href="/">← Back to Calculator</a>
    <a href="https://fomodejavu.com/" target="_blank" rel="noopener">fomodejavu.com ↗</a>
  </div>
</div>
</body>
</html>
